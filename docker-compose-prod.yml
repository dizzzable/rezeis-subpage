# ══════════════════════════════════════════════════════════════════════════════
#  rezeis-subpage — docker-compose (prebuilt image variant)
#
#  Same topology as docker-compose.yml but pulls a prebuilt image instead of
#  building from source. Set the image to your fork's registry once CI publishes
#  it (e.g. ghcr.io/<owner>/rezeis-subpage:latest).
#
#  Usage:  docker compose -f docker-compose-prod.yml pull && \
#          docker compose -f docker-compose-prod.yml up -d
# ══════════════════════════════════════════════════════════════════════════════

services:
  rezeis-subpage:
    image: ghcr.io/dizzzable/rezeis-subpage:latest
    container_name: rezeis-subpage
    hostname: rezeis-subpage
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-3010}
      NODE_ENV: production
    expose:
      - '3010'
    healthcheck:
      test: ['CMD-SHELL', 'kill -0 1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
      - remnawave-network

networks:
  remnawave-network:
    name: remnawave-network
    driver: bridge
    external: true

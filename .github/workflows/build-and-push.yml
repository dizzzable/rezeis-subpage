name: Build and push (rezeis-subpage)

# Fork pipeline. The Dockerfile is self-contained (builds frontend + backend),
# so CI is just: gates → multi-arch image → GHCR under the repo owner.
# Publishes on tag push (v*) or manual dispatch. GHCR auth uses the built-in
# GITHUB_TOKEN (no external secrets required).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rezeis-subpage

jobs:
  gates:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Backend — install, typecheck, lint
        run: |
          cd backend
          npm ci
          npx tsc --noEmit -p tsconfig.build.json
          npx eslint "src/**/*.ts"

      - name: Frontend — install, typecheck
        run: |
          cd frontend
          npm ci
          npm run typecheck
        # NOTE: `npm run lint` (eslint + stylelint) is intentionally NOT run over
        # the whole frontend here — the inherited upstream code has pre-existing
        # perfectionist import-order violations. The real ship-gate is the Docker
        # build below (tsc + vite build). Our own changed files are linted locally.

  build-and-push:
    name: Build & push image
    needs: [gates]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
